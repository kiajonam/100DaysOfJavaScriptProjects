<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <title>Day4 - Qr Code Genarator | Bagheri</title>
</head>

<body>

<section>
    <div class="row">
        <input type="color" class="light" value="#ffffff">
        <input type="color" class="dark" value="#000000">
        <select class="sizes" name="" id="">
            <option value="100">100*100</option>
            <option value="200">200*200</option>
            <option value="300">300*300</option>
        </select>
    </div>
    <input type="text" class="qr-text" placeholder="Enter QR TExt">
    <div id="qr-code"></div>
    <div class="active-container">
        <a href="#" class="download btn" download="QRCode">
            <span>Download</span>
            <img src="download.svg" alt="">
        </a>
        <button class="btn share-btn">
            <span>share</span>
            <img src="share.svg" alt="">
        </button>
    </div>
</section>



<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="script.js"></script>
</body>

</html>

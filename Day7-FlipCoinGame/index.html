
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Day #7 - Flip Coin Game |Bagheri</title>

</head>

<body>

    <div class="container">
        <div class="stats">
            <p id="head-count">Head: 0</p>
            <p id="tail-count">Tail: 0</p>
        </div>
        <div class="coin" id="coin">
              <div class="heads">
                <img src="head.png"  alt="Coin">
            </div>
                <div class="tails">
                <img src="tail.png" alt="Coin">
            </div>
          
        
        </div>
        <div class="buttons">
            <button type="button" id="flip-button">Flip Coin</button>
            <button id="rest-button" type="button">Reset Game</button>
        </div>
    </div>


</body>

</html>
